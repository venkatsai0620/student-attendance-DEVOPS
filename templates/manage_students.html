<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>

        body{
            background:#f5f7fb;
        }

        .manage-container{
            width:90%;
            margin:40px auto;
            background:white;
            border-radius:15px;
            padding:30px;
            box-shadow:0 8px 20px rgba(0,0,0,.15);
        }

        .manage-title{
            text-align:center;
            margin-bottom:30px;
            color:#333;
        }

        .student-form{
            display:grid;
            grid-template-columns:1fr 1fr 1fr auto;
            gap:15px;
            margin-bottom:30px;
        }

        .student-form input{
            padding:12px;
            border-radius:8px;
            border:1px solid #ccc;
            font-size:16px;
        }

        .student-form button{
            background:#4CAF50;
            color:white;
            border:none;
            border-radius:8px;
            padding:12px 20px;
            cursor:pointer;
            font-size:16px;
        }

        .student-form button:hover{
            background:#2e8b57;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#4e73df;
            color:white;
            padding:12px;
        }

        td{
            padding:12px;
            border-bottom:1px solid #ddd;
            text-align:center;
        }

        tr:hover{
            background:#f3f5ff;
        }

        .delete-btn{
            background:#dc3545;
            color:white;
            text-decoration:none;
            padding:8px 15px;
            border-radius:6px;
        }

        .delete-btn:hover{
            background:#b52b37;
        }

        .back-btn{
            display:inline-block;
            margin-top:25px;
            text-decoration:none;
            background:#4e73df;
            color:white;
            padding:10px 18px;
            border-radius:8px;
        }

        .back-btn:hover{
            background:#3558b3;
        }
        .edit-btn{
    background:#f39c12;
    color:white;
    text-decoration:none;
    padding:8px 15px;
    border-radius:6px;
    margin-right:8px;
}

.edit-btn:hover{
    background:#d68910;
}

    </style>

</head>
<body>

<div class="manage-container">

<h1 class="manage-title">👨‍🎓 Manage Students</h1>

<form action="/add_student" method="POST" class="student-form">

<input type="text" name="id" placeholder="Student ID" required>

<input type="text" name="name" placeholder="Student Name" required>

<input type="text" name="class" placeholder="Class" required>

<button type="submit">➕ Add Student</button>

</form>

<table>

<tr>

<th>ID</th>

<th>Name</th>

<th>Class</th>

<th>Actions</th>

</tr>

{% for student in students %}

<tr>

<td>{{ student.id }}</td>

<td>{{ student.name }}</td>

<td>{{ student.class }}</td>

<td>

<a class="edit-btn"
   href="/edit_student/{{ student.id }}">
✏ Edit
</a>

<a class="delete-btn"
   href="#"
   onclick="showDeleteModal('{{ student.name }}', '/delete_student/{{ student.id }}')">
    Delete
</a>

</td>

</tr>

{% endfor %}

</table>

<a href="/" class="back-btn">⬅ Back to Home</a>

</div>
<!-- Delete Confirmation Modal -->
<div id="deleteModal" class="modal">
    <div class="modal-content">
        <h2>🗑 Delete Student</h2>

        <p id="deleteText">
            Are you sure you want to delete this student?
        </p>

        <div class="modal-buttons">
            <button class="cancel-btn" onclick="closeModal()">
                Cancel
            </button>

            <a id="deleteLink" href="#">
                <button class="delete-btn">
                    Delete
                </button>
            </a>
        </div>
    </div>
</div>
<script>

function showDeleteModal(name, link){

    document.getElementById("deleteText").innerHTML =
        "Are you sure you want to delete <b>" + name + "</b>?";

    document.getElementById("deleteLink").href = link;

    document.getElementById("deleteModal").style.display="flex";
}

function closeModal(){

    document.getElementById("deleteModal").style.display="none";
}

window.onclick=function(event){

    let modal=document.getElementById("deleteModal");

    if(event.target==modal){

        closeModal();
    }

}

</script>
</body>
</html>
